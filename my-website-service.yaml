apiVersion: v1
kind: Service
metadata:
  name: my-website-service
spec:
  type: NodePort              # CHANGED from ClusterIP to NodePort
  ports:
  - port: 80                  # Service port (internal)
    targetPort: 80            # Pod port
    nodePort: 30080           # Port exposed on each node (30000-32767)
  selector:
    app: my-website
